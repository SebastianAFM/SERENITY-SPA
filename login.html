<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>inicia sesion</title>
    <link rel="icon" href="img/logo.png">
     <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- AOS Animaciones -->
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <link href="styles/styleslogin.css" rel="stylesheet">

</head>

<body>
<background=img"/fondo.jpg">

    <!-- Navbar -->
<nav class="navbar navbar-expand-lg bg-light shadow">
  <div class="container">
    <a class="navbar-brand" href="index.html">
        <img src="img/logo.png" alt="Logo" width="100" height="100" class="d-inline-block align-text-center">
        Serenity Spa
    </a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="#servicios">Servicios</a></li>
        <li class="nav-item"><a class="nav-link" href="#galeria">Galería</a></li>
        <li class="nav-item"><a class="nav-link" href="#contacto">Contacto</a></li>
      </ul>
    </div>
  </div>
</nav>

 <div class="overlay">

    <div class="login-card">

      <h1>Bienvenido</h1>

      <p>
        Inicia sesión y continúa tu experiencia de relajación
      </p>

      <form id="loginForm">

        <!-- Correo -->
        <div class="mb-3">

          <label class="form-label">
            Correo electrónico
          </label>

          <div class="input-group">

            <span class="input-group-text">
              <i class="bi bi-envelope"></i>
            </span>

            <input 
              type="email"
              class="form-control"
              id="correo"
              placeholder="ejemplo@email.com"
              required
            >

          </div>

          <div class="error" id="correoError">
            Ingresa un correo válido
          </div>

        </div>

        <!-- Contraseña -->
        <div class="mb-4">

          <label class="form-label">
            Contraseña
          </label>

          <div class="input-group">

            <span class="input-group-text">
              <i class="bi bi-lock"></i>
            </span>

            <input 
              type="password"
              class="form-control"
              id="password"
              placeholder="Ingresa tu contraseña"
              required
            >

          </div>

          <div class="error" id="passwordError">
            La contraseña debe tener mínimo 8 caracteres
          </div>

        </div>

        <!-- Botón -->
        <button type="submit" class="btn-login">
          Iniciar Sesión
        </button>

        <div class="success" id="successMessage">
          Inicio de sesión exitoso ✨
        </div>

      </form>

      <div class="extra-links">

        <p class="mt-3">
          ¿No tienes una cuenta?
          <a href="registro.html">
            Regístrate aquí
          </a>
        </p>

        <a href="#">
          ¿Olvidaste tu contraseña?
        </a>

      </div>

    </div>

  </div>


<!-- WhatsApp -->
<a href="https://wa.me/573001234567" target="_blank" class="whatsapp">
  <i class="bi bi-whatsapp"></i>
</a>

<!-- Supabase SDK y Conexión de Base de Datos -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="scripts/database.js"></script>
<!-- Lógica del Login -->
<script src="scripts/loginscript.js"></script>

<!-- SweetAlert2 -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<!-- Override Alertas -->
<script src="scripts/alerts.js"></script>
</body>
</html>
